<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer Pro - Elite Dragon Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="premium-background">
        <div class="storm-overlay"></div>
        <div class="glow-orb blue-orb"></div>
        <div class="glow-orb purple-orb"></div>
        
        <div class="cyber-lines">
            <div class="cyber-line cl-1"></div>
            <div class="cyber-line cl-2"></div>
            <div class="cyber-line cl-3"></div>
            <div class="cyber-line cl-4"></div>
        </div>

        <div class="lightning-flash" id="lightningFlash"></div>
        <div class="tech-grid"></div>
    </div>

    <main class="login-wrapper">
        <div class="login-glass-panel">
            
            <div class="model-section">
                <div class="dragon-container" id="dragonTracker">
                    <img src="l1.png" alt="Electric Dragon" class="dragon-img" draggable="false">
                </div>
                
                <div class="model-overlay-text">
                    <h2 class="shimmer-text">as tech</h2>
                    <p>Secure Identity Protocol</p>
                </div>
            </div>

            <div class="form-section">
                <div class="form-header">
                    <h2 class="premium-heading">Welcome Back</h2>
                    <p>Sign in to your elite workspace.</p>
                </div>

                <form id="loginForm" class="login-form">
                    
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="arun@astech.com" required autocomplete="off">
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <button type="button" class="eye-toggle interactive" id="eyeToggle" aria-label="Toggle Password">👁️</button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-pass">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-primary interactive" id="loginBtn">
                        Sign In <span class="arrow">→</span>
                    </button>

                    <div class="divider">
                        <span>OR CONTINUE WITH</span>
                    </div>

                    <div class="social-login">
                        <button type="button" id="googleBtn" class="btn-secondary google-btn interactive">
                            <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
                                <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                                <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                                <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                                <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                            </svg>
                            Sign in with Google
                        </button>
                    </div>

                </form>

                <p class="signup-link">
                    Don't have an account? 
                    <a href="signup.html" class="signup-google-link interactive">
                        Create an account
                    </a>
                </p>
            </div>

        </div>
    </main>

    <script type="module" src="login.js"></script>
</body>
</html>
