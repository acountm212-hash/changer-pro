<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer Pro 10.0 | Liquid Glass Workspace</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        body, html { background-color: #050510; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .liquid-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -10; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.35; animation: float 10s infinite ease-in-out alternate; }
        .blob-1 { width: 450px; height: 450px; background: #3b82f6; top: -100px; left: -100px; }
        .blob-2 { width: 550px; height: 550px; background: #8b5cf6; bottom: -200px; right: -100px; animation-delay: -2s; }
        .blob-3 { width: 350px; height: 350px; background: #ec4899; top: 40%; left: 30%; transform: translate(-50%, -50%); animation-delay: -4s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, 60px) scale(1.1); } }
        .sidebar, .floating-toolbar { background: rgba(15, 23, 42, 0.4) !important; backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px); border: 1px solid rgba(255, 255, 255, 0.05) !important; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4) !important; }
        .top-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 25px; margin: 15px 25px; border-radius: 16px; background: rgba(15, 23, 42, 0.6) !important; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1) !important; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important; }
        .central-controls { display: flex; align-items: center; justify-content: center; gap: 12px; flex-grow: 1; }
        .nav-btn.primary.upload-pro-btn { background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%) !important; border: none !important; color: white !important; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4) !important; padding: 10px 24px !important; border-radius: 10px !important; font-weight: 600 !important; text-transform: uppercase; letter-spacing: 0.5px; display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease !important; cursor: pointer; }
        .nav-btn.primary.upload-pro-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6) !important; }
        textarea, select, input[type="number"], input[type="text"] { background: rgba(0, 0, 0, 0.4) !important; color: white !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 8px !important; padding: 8px 12px !important; font-family: 'Inter', sans-serif; }
        select option, optgroup { background-color: #0f172a; color: white; }
        #textInput { width: 180px; height: 38px; resize: none; font-size: 0.95rem; }
        .action-btn, .nav-btn, .upload-label { background: rgba(255,255,255,0.05) !important; color: #e2e8f0 !important; border: 1px solid rgba(255,255,255,0.08) !important; border-radius: 8px !important; transition: all 0.2s ease !important; }
        .action-btn.active, .nav-btn:hover, .upload-label:hover { background: rgba(59, 130, 246, 0.2) !important; border-color: #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4) !important; color: white !important; }
        .nav-btn.success { background: rgba(16, 185, 129, 0.15) !important; border-color: #10b981 !important; color: #10b981 !important; }
        .nav-btn.success:hover { background: #10b981 !important; color: white !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6) !important; }
        .nav-btn.danger { background: rgba(239, 68, 68, 0.15) !important; border-color: #ef4444 !important; color: #f87171 !important; }
        .brand .logo-icon { background: linear-gradient(135deg, #00f2fe, #4facfe); border-radius: 8px; font-weight: 900; color: white; box-shadow: 0 0 15px rgba(0, 242, 254, 0.6); }
        .brand h1 { font-family: 'Outfit', sans-serif; background: linear-gradient(to right, #fff, #a5b4fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .auth-controls { display: flex; align-items: center; gap: 15px; margin-left: 15px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 15px; }
        .auth-controls span { font-family: 'Outfit', sans-serif; color: #a5b4fc; font-weight: 600; }
        #editorLogoutBtn { background: rgba(239, 68, 68, 0.15) !important; color: #f87171 !important; border: 1px solid rgba(239, 68, 68, 0.3) !important; border-radius: 6px !important; font-size: 0.85rem !important; }
        .canvas-shadow-wrapper { box-shadow: 0 15px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05) !important; border-radius: 10px; overflow: hidden; }
        .pop-effect { animation: popClick 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popClick { 0% { transform: scale(1); } 50% { transform: scale(0.92); } 100% { transform: scale(1); } }
        .pdf-controls { display: none; align-items: center; gap: 8px; background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); margin-left: 10px; }
        .pdf-nav-btn { background: #3b82f6; border: none; color: white; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-weight: bold; }
        .pdf-nav-btn:hover { background: #2563eb; }
    </style>
</head>
<body>

    <div class="liquid-bg">
        <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    </div>

    <div class="elite-wrapper">
        <aside class="sidebar glass-panel">
            <div class="brand">
                <div class="logo-icon interactive">C</div>
                <h1>CHANGER <span>PRO</span></h1>
            </div>
            
            <div class="tool-group">
                <p class="group-label">Editing Tools</p>
                <button id="toolMove" class="action-btn active interactive"><span>🖐️</span> Select & Move</button>
                <button id="toolErase" class="action-btn interactive"><span>🟦</span> Box Eraser (Patch)</button>
                <button id="toolMagnify" class="action-btn interactive"><span>🔍</span> Magnifier Lens</button>
                
                <button id="toggleGridBtn" class="action-btn interactive" style="border-color: #38bdf8; color: #38bdf8;"><span>📏</span> Ruler & Grid</button>
                
                <button id="undoBtn" class="action-btn secondary interactive" style="margin-top: 10px;"><span>↩️</span> Undo Last Step</button>
            </div>

            <div class="tool-group">
                <p class="group-label">Elements & Stickers</p>
                <label for="uploadSticker" class="upload-label interactive">
                    <span>✨</span> Add Premium Sticker
                    <input type="file" id="uploadSticker" hidden accept="image/png, image/jpeg">
                </label>
            </div>

            <div class="tool-group">
                <p class="group-label">Magnetic Snapping</p>
                <label class="toggle-switch interactive">
                    <input type="checkbox" id="snapCenter" checked>
                    <span class="slider"></span> Snap to Center
                </label>
                <label class="toggle-switch interactive">
                    <input type="checkbox" id="snapObjects" checked>
                    <span class="slider"></span> Snap to Objects
                </label>
            </div>
        </aside>

        <main class="workspace">
            <header class="top-nav">
                <div class="nav-section" style="display: flex; align-items: center;">
                    <input type="file" id="upload" hidden accept="image/*, application/pdf">
                    <label for="upload" class="nav-btn primary upload-pro-btn interactive">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        Load Media or PDF
                    </label>

                    <div id="pdfControls" class="pdf-controls">
                        <button id="prevPageBtn" class="pdf-nav-btn interactive">◀</button>
                        <span id="pageInfo" style="font-weight: 600; color: #a5b4fc; font-size: 0.9rem;">Page 1 / 1</span>
                        <button id="nextPageBtn" class="pdf-nav-btn interactive">▶</button>
                    </div>

                    <button id="clearBtn" class="nav-btn danger interactive" style="display: none; margin-left: 10px;">Reset</button>
                </div>

                <div class="nav-section central-controls">
                    <textarea id="textInput" placeholder="Enter text..." rows="1"></textarea>
                    
                    <select id="fontFamily" class="elite-select interactive" style="width: 180px;">
                        <optgroup label="📄 OFFICIAL PDF FONTS" style="color: #38bdf8;">
                            <option value="Arial">Arial</option>
                            <option value="Helvetica">Helvetica</option>
                            <option value="Times New Roman">Times New Roman</option>
                            <option value="Courier New">Courier New</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Trebuchet MS">Trebuchet MS</option>
                        </optgroup>
                        <optgroup label="💳 PAYMENT APPS" class="highlight-group">
                            <option value="Inter">🟦 [ P ] - Paytm</option>
                            <option value="Roboto">🟪 [ PP ] - PhonePe</option>
                            <option value="Open Sans">🔵 [ Gp ] - Google Pay</option>
                            <option value="Montserrat">⬛ [ m ] - Mobikwik</option>
                            <option value="Poppins">🟧 [ f ] - Freecharge</option>
                        </optgroup>
                        <optgroup label="✨ 75+ STYLISH FONTS">
                            <option value="Dancing Script">Dancing Script</option>
                            <option value="Pacifico">Pacifico</option>
                            <option value="Orbitron">Orbitron</option>
                            </optgroup>
                    </select>

                    <input type="number" id="fontSize" value="21" class="size-input interactive" title="Font Size">

                    <select id="fontWeight" class="elite-select interactive" style="width: 120px;">
                        <option value="100">Thin</option>
                        <option value="200">Extra Light</option>
                        <option value="300">Light</option>
                        <option value="normal" selected>Regular</option>
                        <option value="500">Medium</option>
                        <option value="600">Semi Bold</option>
                        <option value="bold">Bold</option>
                        <option value="800">Extra Bold</option>
                        <option value="900">Heavy</option>
                    </select>

                    <button id="addTextBtn" class="nav-btn accent interactive">➕ Add</button>
                    <button id="updateTextBtn" class="nav-btn warning interactive" style="display: none;">🔄 Update</button>
                </div>
                
                <div class="nav-section" style="display:flex; gap: 10px;">
                    <button id="downloadBtn" class="nav-btn success interactive" title="Save as Image">🖼️ Save IMG</button>
                    <button id="downloadPdfBtn" class="nav-btn interactive" style="background: rgba(56, 189, 248, 0.2); border: 1px solid #38bdf8; color: #38bdf8;" title="Save as PDF">📄 Save PDF</button>

                    <div class="auth-controls">
                        <span id="editorUserDisplay"></span>
                        <button id="editorLogoutBtn" class="nav-btn interactive">Exit</button>
                    </div>
                </div>
            </header>
            
            <div class="canvas-container">
                <div class="canvas-shadow-wrapper">
                    <canvas id="editorCanvas"></canvas>
                </div>
            </div>

            <div id="floatingToolbar" class="floating-toolbar">
                <div class="ft-main">
                    <button class="ft-btn interactive" id="ftLock" title="Lock/Unlock">🔓</button>
                    <button class="ft-btn interactive" id="ftCopy" title="Duplicate">📄</button>
                    <button class="ft-btn interactive" id="ftHide" title="Hide">👁️</button>
                    <button class="ft-btn interactive" id="ftDelete" title="Delete" style="color: #ff4d4d;">🗑️</button>
                    <button class="ft-btn interactive" id="ftExpand" title="More">▶️</button>
                </div>
                <div class="ft-drawer" id="ftDrawer">
                    <button class="ft-btn text-btn interactive" id="ftFront">⬆️ Front</button>
                    <button class="ft-btn text-btn interactive" id="ftBack">⬇️ Back</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
    <script src="pdf-engine.js"></script>
    <script type="module" src="editor.js"></script>

</body>
</html>
